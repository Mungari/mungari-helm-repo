# ──────────────────────────────────────────────
# django-app Helm chart — default values
# Override any key with -f my-values.yaml or --set
# ──────────────────────────────────────────────

# -- Number of pod replicas
replicaCount: 2

image:
  # -- Container image repository
  repository: containerapp
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag; defaults to Chart.appVersion
  tag: ""

# -- Image pull secrets (list of secret names)
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the fully-qualified app name
fullnameOverride: ""

# ──────────────────────────────────────────────
# Application config (rendered into config.json via ConfigMap)
# ──────────────────────────────────────────────
appConfig:
  # -- Accent colour shown in the UI (any CSS colour string)
  accentColor: "#00c8a0"
  # -- Message displayed on the home page
  message: "Hello from your container!"
  # -- Application display name
  appName: "ContainerApp"
  # -- Deployment environment label (development | staging | production)
  environment: "production"
  # -- Application version label
  version: "1.0.0"

# ──────────────────────────────────────────────
# Additional environment variables injected directly into the pod.
# Useful for Django settings that are NOT part of appConfig.
# env:
#   - name: DEBUG
#     value: "False"
#   - name: SECRET_KEY
#     valueFrom:
#       secretKeyRef:
#         name: django-secrets
#         key: secretKey
# ──────────────────────────────────────────────
env: []

# ──────────────────────────────────────────────
# Service
# ──────────────────────────────────────────────
service:
  # -- Service type (ClusterIP | NodePort | LoadBalancer)
  type: ClusterIP
  # -- Service port
  port: 80
  # -- Container port
  targetPort: 8000

# ──────────────────────────────────────────────
# APISIX route
# Requires the APISIX Ingress Controller CRDs to be installed.
# ──────────────────────────────────────────────
apisix:
  # -- Enable the ApisixRoute resource
  enabled: false
  # -- Hostname the route listens on
  host: "django-app.example.com"
  # -- URL prefix to match
  pathPrefix: "/"
  # -- APISIX Gateway class / IngressClass name
  ingressClassName: "apisix"
  # -- TLS configuration
  tls:
    # -- Enable TLS on the APISIX route
    enabled: false
    # -- Name of the TLS secret (must exist in the same namespace)
    secretName: "django-app-tls"
  # -- Extra APISIX plugins to attach to the route
  # plugins: []
  # #  example:
  # #  - name: limit-req
  # #    enable: true
  # #    config:
  # #      rate: 100
  # #      burst: 50
  # #      key: "remote_addr"
  plugins: []

# ──────────────────────────────────────────────
# Azure Load Balancer — BackendAddressPool binding
#
# Analogous to AWS TargetGroupBinding (instance mode):
# registers pod-backing nodes into an Azure LB Backend Pool
# via the Azure Load Balancer Controller CRD.
# Requires: https://github.com/Azure/azure-load-balancer-controller
# ──────────────────────────────────────────────
azureLoadBalancer:
  # -- Enable the AzureLoadBalancerBackendPool binding
  enabled: false
  # -- Name of the Azure LB Backend Address Pool to bind
  backendPoolName: "django-app-pool"
  # -- Azure Load Balancer name (must exist in Azure)
  loadBalancerName: "my-azure-lb"
  # -- Azure Resource Group that owns the load balancer
  resourceGroup: "my-resource-group"
  # -- Node selector labels used to pick target nodes (instance mode)
  nodeSelector:
    agentpool: "default"
  # -- Port on each node that receives LB traffic
  servicePort: 80
  # -- Protocol (TCP | UDP)
  protocol: TCP

# ──────────────────────────────────────────────
# Probes
# ──────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health/
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready/
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

# ──────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# ──────────────────────────────────────────────
# Autoscaling (HPA)
# ──────────────────────────────────────────────
autoscaling:
  # -- Enable HorizontalPodAutoscaler
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# ──────────────────────────────────────────────
# Pod scheduling
# ──────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

# -- Annotations added to every pod
podAnnotations: {}

# -- Labels added to every pod
podLabels: {}

# -- Pod-level security context
podSecurityContext: {}
  # fsGroup: 2000

# -- Container-level security context
securityContext: {}
  # runAsNonRoot: true
  # runAsUser: 1000
  # readOnlyRootFilesystem: true

# -- Service account
serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- Name override; auto-generated if blank
  name: ""
