apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "django-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "django-app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "django-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      # Trigger a rolling restart when the ConfigMap content changes.
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "django-app.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "django-app.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "django-app.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          # ── Environment variables ──────────────────────────────────────
          env:
            - name: CONFIG_FILE_PATH
              value: /etc/app/config.json
            # App-config values are also surfaced as env vars so the app
            # can fall back to them if the file is missing.
            - name: APP_NAME
              value: {{ .Values.appConfig.appName | quote }}
            - name: APP_ENV
              value: {{ .Values.appConfig.environment | quote }}
            - name: APP_VERSION
              value: {{ .Values.appConfig.version | quote }}
            - name: ACCENT_COLOR
              value: {{ .Values.appConfig.accentColor | quote }}
            - name: APP_MESSAGE
              value: {{ .Values.appConfig.message | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          # ── Volume mounts ─────────────────────────────────────────────
          volumeMounts:
            - name: app-config
              mountPath: /etc/app
              readOnly: true

          # ── Probes ────────────────────────────────────────────────────
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}

          # ── Resources ─────────────────────────────────────────────────
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      # ── Volumes ───────────────────────────────────────────────────────
      volumes:
        - name: app-config
          configMap:
            name: {{ include "django-app.fullname" . }}-config

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
