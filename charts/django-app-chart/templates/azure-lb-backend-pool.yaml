{{- if .Values.azureLoadBalancer.enabled -}}
# ──────────────────────────────────────────────────────────────────────────────
# AzureLoadBalancerBackendPool
#
# Registers the nodes backing this Deployment into an Azure LB Backend Pool —
# the Azure equivalent of AWS TargetGroupBinding in "instance" mode.
#
# Requires: Azure Load Balancer Controller
#   https://github.com/Azure/azure-load-balancer-controller
# CRD: azureloadbalancerbackendpools.networking.azure.com
#
# Toggle: azureLoadBalancer.enabled = true
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: networking.azure.com/v1alpha1
kind: AzureLoadBalancerBackendPool
metadata:
  name: {{ include "django-app.fullname" . }}-backend-pool
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "django-app.labels" . | nindent 4 }}
spec:
  # Reference to the Azure Load Balancer and its backend pool.
  loadBalancer:
    name: {{ .Values.azureLoadBalancer.loadBalancerName | quote }}
    resourceGroup: {{ .Values.azureLoadBalancer.resourceGroup | quote }}
  backendPool:
    name: {{ .Values.azureLoadBalancer.backendPoolName | quote }}

  # Instance mode: target the underlying VM/VMSS nodes that match the
  # nodeSelector, rather than pod IPs directly. This mirrors how AWS ALB
  # TargetGroupBinding works in "instance" mode.
  targetType: Instance

  # The controller uses this selector to find the nodes to register.
  nodeSelector:
    matchLabels:
      {{- toYaml .Values.azureLoadBalancer.nodeSelector | nindent 6 }}

  # Port mapping from the LB to each target node.
  ports:
    - port: {{ .Values.azureLoadBalancer.servicePort }}
      protocol: {{ .Values.azureLoadBalancer.protocol }}

  # Tie registrations to pods owned by this Deployment so that the controller
  # can deregister nodes when pods are drained or scaled down.
  serviceRef:
    name: {{ include "django-app.fullname" . }}
    namespace: {{ .Release.Namespace }}
    port: {{ .Values.service.port }}
{{- end }}
