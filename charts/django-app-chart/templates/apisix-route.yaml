{{- if .Values.apisix.enabled -}}
# ──────────────────────────────────────────────────────────────────────────────
# ApisixRoute
# Requires: APISIX Ingress Controller (https://apisix.apache.org/docs/ingress-controller)
# CRD: apisixroutes.apisix.apache.org
# Toggle: apisix.enabled = true
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: {{ include "django-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "django-app.labels" . | nindent 4 }}
spec:
  http:
    - name: {{ include "django-app.fullname" . }}-route
      match:
        hosts:
          - {{ .Values.apisix.host | quote }}
        paths:
          - {{ .Values.apisix.pathPrefix | trimSuffix "/" }}*
      backends:
        - serviceName: {{ include "django-app.fullname" . }}
          servicePort: {{ .Values.service.port }}
      {{- if .Values.apisix.plugins }}
      plugins:
        {{- toYaml .Values.apisix.plugins | nindent 8 }}
      {{- end }}
---
{{- if .Values.apisix.tls.enabled }}
# ApisixTls — binds the TLS secret to the route host.
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: {{ include "django-app.fullname" . }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "django-app.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.apisix.host | quote }}
  secret:
    name: {{ .Values.apisix.tls.secretName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
