apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "django-app.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "django-app.labels" . | nindent 4 }}
data:
  # Rendered as /etc/app/config.json inside the container.
  # The application reads this file first; env vars are the fallback.
  config.json: |
    {
      "accent_color": {{ .Values.appConfig.accentColor | quote }},
      "message":      {{ .Values.appConfig.message      | quote }},
      "app_name":     {{ .Values.appConfig.appName      | quote }},
      "environment":  {{ .Values.appConfig.environment  | quote }},
      "version":      {{ .Values.appConfig.version      | quote }}
    }
